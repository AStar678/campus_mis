<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>教务管理台 - 课程资源分配</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: white; padding: 24px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; color: #1a73e8; border-left: 4px solid #1a73e8; padding-left: 10px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        .input-box { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        .input-box:focus { border-color: #1a73e8; outline: none; }
        .btn { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background: #1557b0; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 4px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="app">
        <div class="toast" v-if="toastMsg">{{ toastMsg }}</div>

        <div class="header-bar">
            <h2>⚙️ 系统管理员 - 教务统筹平台</h2>
            <button class="btn" style="background: #5f6368;" @click="goBack">返回服务大厅</button>
        </div>
        
        <div class="card">
            <h3>新建课程与教资分配</h3>
            <div class="form-group">
                <label>课程名称</label>
                <input type="text" v-model="form.name" class="input-box" placeholder="例如：高级计算机网络">
            </div>
            <div class="form-group">
                <label>授课教师工号</label>
                <input type="text" v-model="form.teacher_id" class="input-box" placeholder="请输入4位工号（例如：1001）">
            </div>
            <div class="form-group">
                <label>教学大纲 / 课程简介</label>
                <textarea rows="4" v-model="form.description" class="input-box" placeholder="请输入课程的简要说明或排课备注..."></textarea>
            </div>
            <button class="btn" @click="createCourse">确认建课并下发</button>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        const token = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('classroom_token');

        createApp({
            data() {
                return {
                    toastMsg: '',
                    form: { 
                        name: '', 
                        teacher_id: '', 
                        description: '' 
                    }
                }
            },
            methods: {
                showToast(msg) {
                    this.toastMsg = msg;
                    setTimeout(() => { this.toastMsg = ''; }, 3000);
                },
                async createCourse() {
                    if (!this.form.name || !this.form.teacher_id) {
                        this.showToast('课程名称和教师工号为必填项');
                        return;
                    }

                    try {
                        const res = await fetch('/api/classroom/courses', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}` 
                            },
                            body: JSON.stringify(this.form)
                        });
                        const data = await res.json();
                        if (data.success) {
                            this.showToast('✅ 课程创建成功，教师端已同步');
                            this.form = { name: '', teacher_id: '', description: '' };
                        } else {
                            this.showToast(data.message || '创建失败');
                        }
                    } catch (e) {
                        this.showToast('网络请求失败，请检查后端服务');
                    }
                },
                goBack() {
                    const host = window.location.hostname;
                    window.location.href = `http://${host}:5001/`;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
