<script>
const { createApp } = Vue;
const DEFAULT_SETTINGS = {
    termName: '2025-2026 学年第二学期',
    phase: 'selecting',
    phaseLabel: '正式选课阶段',
    maxPreferences: 3,
    minCredits: 2,
    maxCredits: 8,
    startAt: '2026-06-01 09:00',
    endAt: '2026-06-20 18:00',
    notice: '排课结果以管理员发布为准。',
    inTimeWindow: true,
    canSubmit: true,
    canCancel: true,
    canSchedule: false,
    canPublish: false,
};

createApp({
    data() {
        return {
            loading: true,
            scheduleRunning: false,
            toast: '',
            errorMsg: '',
            token: new URLSearchParams(window.location.search).get('token') || localStorage.getItem('course_schedule_token') || '',
            user: {},
            studentProfile: {},
            localSettings: { ...DEFAULT_SETTINGS },
            settingsDraft: { ...DEFAULT_SETTINGS },
            courses: [],
            requests: [],
            results: [],
            timeSlots: [],
            classrooms: [],
            teacherSections: [],
            teacherRequests: [],
            preferenceDrafts: {},
            sectionDrafts: {},
            courseKeyword: '',
            courseFilter: 'all',
            courseSort: 'code',
            requestFilter: 'active',
            adminTab: 'courses',
            editingCourseId: '',
            editingSectionId: '',
            editingResultId: '',
            editingTeacherSectionId: '',
            courseDraft: {},
            sectionDraft: {},
            resultDraft: {},
            teacherAvailabilityDraft: {},
            auditLog: JSON.parse(localStorage.getItem('course_schedule_audit_log') || '[]'),
            courseForm: { course_id: '', course_name: '', teacher_id: '', capacity: 40, credits: 2, hours_per_week: 2, preferred_building: '', allowed_majors: 'all', allowed_grades: 'all', prerequisite_note: '无', status: 'open' },
            sectionForm: { course_id: '', section_name: '', teacher_id: '', capacity: 40, preferred_building: '', required_room_type: '普通教室', unavailable_slot_ids: '', status: 'open' },
            slotForm: { weekday: 1, start_time: '08:00', end_time: '09:40', label: '' }
        };
    },
    computed: {
        roleLabel() {
            return { student: '学生', admin: '管理员', teacher: '教师' }[this.user.user_type] || '';
        },
        termName() {
            return this.localSettings.termName || '当前学期';
        },
        phaseLabel() {
            return this.localSettings.phaseLabel || '选课阶段';
        },
        selectionWindowState() {
            if (!this.localSettings.inTimeWindow) return { open: false, label: '不在批次时间' };
            return { open: Boolean(this.localSettings.canSubmit), label: this.localSettings.canSubmit ? '可提交' : '不可提交' };
        },
        isSelectionOpen() {
            return Boolean(this.localSettings.canSubmit);
        },
        openCourses() {
            return this.courses.filter(course => course.status === 'open');
        },
        requiredPlanCourses() {
            return this.openCourses.filter(course => this.isRequiredCourse(course));
        },
        selectableCourses() {
            return this.openCourses.filter(course => !this.isRequiredCourse(course) && this.openSections(course).length > 0);
        },
        selectableSectionCount() {
            return this.selectableCourses.reduce((total, course) => total + this.openSections(course).length, 0);
        },
        activeRequests() {
            return this.requests.filter(item => item.status !== 'cancelled');
        },
        activeCredits() {
            const total = this.activeRequests.reduce((sum, item) => {
                const course = this.courseById(item.course_id);
                return sum + Number(course.credits || 0);
            }, 0);
            return Number.isInteger(total) ? total : total.toFixed(1);
        },
        creditBreakdown() {
            const result = { required: 0, elective: 0, public: 0 };
            this.activeRequests.forEach(item => {
                const course = this.courseById(item.course_id);
                const type = this.courseType(course).key;
                result[type] += Number(course.credits || 0);
            });
            Object.keys(result).forEach(key => {
                result[key] = Number.isInteger(result[key]) ? result[key] : Number(result[key].toFixed(1));
            });
            return result;
        },
        creditPlanStatus() {
            const credits = Number(this.activeCredits);
            const minCredits = Number(this.localSettings.minCredits || 0);
            const maxCredits = Number(this.localSettings.maxCredits || 999);
            if (credits > maxCredits) return { className: 'danger', label: '超出上限' };
            if (credits < minCredits) return { className: 'warn', label: '低于下限' };
            return { className: 'ok', label: '学分合理' };
        },
        allSections() {
            return this.courses.flatMap(course => (course.sections || []).map(section => ({
                ...section,
                course_name: course.course_name,
            })));
        },
        submittedRequests() {
            return this.requests.filter(item => ['submitted', 'scheduled', 'waitlisted'].includes(item.status));
        },
        teacherActiveRequests() {
            return this.teacherRequests.filter(item => ['submitted', 'scheduled', 'waitlisted'].includes(item.status));
        },
        teacherWaitlistedRequests() {
            return this.teacherRequests.filter(item => item.status === 'waitlisted');
        },
        scheduledRequestCount() {
            return this.requests.filter(item => item.status === 'scheduled').length;
        },
        waitlistedRequestCount() {
            return this.requests.filter(item => item.status === 'waitlisted').length;
        },
        duplicatePreferenceLevels() {
            const counts = {};
            this.activeRequests.forEach(item => {
                counts[item.preference_level] = (counts[item.preference_level] || 0) + 1;
            });
            return Object.keys(counts).filter(level => counts[level] > 1).map(level => `第 ${level} 意向`);
        },
        studentPlanWarnings() {
            const warnings = [];
            if (this.activeRequests.length > Number(this.localSettings.maxPreferences || 3)) warnings.push(`当前有效意向超过 ${this.localSettings.maxPreferences || 3} 门，建议保留最想上的选修课或公共课。`);
            if (Number(this.activeCredits) < Number(this.localSettings.minCredits || 0)) warnings.push(`当前意向学分低于本批次最低 ${this.localSettings.minCredits} 学分，建议继续补充课程。`);
            if (Number(this.activeCredits) > Number(this.localSettings.maxCredits || 999)) warnings.push(`当前意向学分超过本批次最高 ${this.localSettings.maxCredits} 学分，请减少课程。`);
            if (!this.hasPreference(1)) warnings.push('尚未设置第一意向，建议至少选择一门最优先的选修课或公共课。');
            if (this.duplicatePreferenceLevels.length) warnings.push(`存在重复意向级别：${this.duplicatePreferenceLevels.join('、')}，建议按优先级区分。`);
            if (this.activeRequests.some(item => {
                const section = this.requestSection(item);
                return section.section_id && Number(section.active_request_count) > Number(section.capacity);
            })) warnings.push('你的意向中存在超容量教学班，建议增加备选课程。');
            if (!this.hasBalancedCourseTypes) warnings.push('建议至少保留 1 门专业选修课或公共课，避免选课意向过于单一。');
            return warnings;
        },
        hasBalancedCourseTypes() {
            const types = new Set(this.activeRequests.map(item => this.courseType(this.courseById(item.course_id)).key));
            return types.has('elective') || types.has('public');
        },
        overloadedCourses() {
            return this.courses.filter(course => Number(course.active_request_count) > Number(course.capacity));
        },
        incompleteCourses() {
            return this.selectableCourses.filter(course => (
                this.openSections(course).some(section => (
                    !section.teacher_id || !section.preferred_building || !Number(section.capacity)
                ))
            ));
        },
        scheduleConflicts() {
            const groups = {};
            this.results.forEach(item => {
                const key = `${item.classroom_id || '-'}-${item.slot_id || '-'}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(item);
            });
            return Object.entries(groups)
                .filter(([, items]) => items.length > 1)
                .map(([key, items]) => ({
                    key,
                    count: items.length,
                    label: `${items[0].classroom_id} ${items[0].weekday_label} ${items[0].start_time}-${items[0].end_time}`,
                }));
        },
        teacherScheduleConflicts() {
            const groups = {};
            this.results.forEach(item => {
                if (!item.section_teacher_id) return;
                const key = `${item.section_teacher_id}-${item.slot_id || '-'}`;
                if (!groups[key]) groups[key] = [];
                groups[key].push(item);
            });
            return Object.entries(groups)
                .filter(([, items]) => items.length > 1)
                .map(([key, items]) => ({
                    key,
                    count: items.length,
                    label: `教师 ${items[0].section_teacher_id} ${items[0].weekday_label} ${items[0].start_time}-${items[0].end_time}`,
                }));
        },
        unpublishedResultCount() {
            return this.results.filter(item => !item.is_published).length;
        },
        scheduleVersion() {
            if (!this.results.length) return '尚未生成';
            const latest = this.results.map(item => item.created_at || '').sort().slice(-1)[0];
            return latest ? `方案 ${String(latest).replace('T', ' ').slice(0, 16)}` : '当前方案';
        },
        resultSectionIds() {
            return new Set(this.results.map(item => item.section_id).filter(Boolean));
        },
        unscheduledCourses() {
            const requestedSectionIds = new Set(this.submittedRequests.map(item => item.section_id).filter(Boolean));
            return this.selectableCourses.filter(course => (
                this.openSections(course).some(section => (
                    requestedSectionIds.has(section.section_id) && !this.resultSectionIds.has(section.section_id)
                ))
            ));
        },
        canRunSchedule() {
            return this.selectableSectionCount > 0 && this.submittedRequests.length > 0 && this.timeSlots.length > 0 && this.classrooms.length > 0;
        },
        scheduleBlockReasons() {
            const reasons = [];
            if (!this.localSettings.canSchedule) {
                reasons.push(`当前批次为“${this.phaseLabel}”，后端不允许生成排课。请到“批次设置”切换到“排课处理阶段”或“补退选阶段”。`);
            }
            if (!this.selectableSectionCount) reasons.push('没有开放的可选教学班，请先在“课程供给”中开放或新增教学班。');
            if (!this.submittedRequests.length) reasons.push('没有有效选课意向，至少需要 1 条已提交/已排课/候补申请才能生成方案。');
            if (!this.timeSlots.length) reasons.push('没有排课可用时间段，请先在“课程供给”下方新增时间段。');
            if (!this.classrooms.length) reasons.push('没有从主服务读取到可用教室，请确认主服务数据库 classrooms 表有数据。');
            return reasons;
        },
        scheduleBlockText() {
            return this.scheduleBlockReasons.length ? this.scheduleBlockReasons.join('；') : '可以生成排课方案';
        },
        canGenerateSchedule() {
            return this.scheduleBlockReasons.length === 0;
        },
        filteredOpenCourses() {
            const keyword = this.courseKeyword.toLowerCase();
            let list = this.openCourses.filter(course => {
                const sectionText = (course.sections || [])
                    .map(section => `${section.section_id} ${section.section_name} ${section.teacher_id || ''}`)
                    .join(' ');
                const text = `${course.course_id} ${course.course_name} ${course.teacher_id || ''} ${sectionText}`.toLowerCase();
                if (keyword && !text.includes(keyword)) return false;
                if (this.courseFilter === 'available') return course.remaining_capacity > 0;
                if (this.courseFilter === 'hot') return this.capacityPercent(course) >= 80;
                if (this.courseFilter === 'requested') return this.hasRequested(course.course_id);
                if (this.courseFilter === 'required') return this.courseType(course).key === 'required';
                if (this.courseFilter === 'elective') return this.courseType(course).key === 'elective';
                if (this.courseFilter === 'public') return this.courseType(course).key === 'public';
                return true;
            });
            list = [...list].sort((a, b) => {
                if (this.courseSort === 'capacity') return b.remaining_capacity - a.remaining_capacity;
                if (this.courseSort === 'demand') return this.capacityPercent(b) - this.capacityPercent(a);
                return String(a.course_id).localeCompare(String(b.course_id));
            });
            return list;
        },
        filteredSelectableCourses() {
            return this.filteredOpenCourses.filter(course => !this.isRequiredCourse(course) && this.openSections(course).length > 0);
        },
        filteredSelectableSectionCount() {
            return this.filteredSelectableCourses.reduce((total, course) => total + this.openSections(course).length, 0);
        },
        filteredRequests() {
            if (this.requestFilter === 'active') return this.requests.filter(item => item.status !== 'cancelled');
            if (this.requestFilter === 'all') return this.requests;
            return this.requests.filter(item => item.status === this.requestFilter);
        },
        demandCourses() {
            return [...this.selectableCourses].sort((a, b) => this.capacityPercent(b) - this.capacityPercent(a));
        },
        weekDays() {
            return [
                { value: 1, label: '周一' },
                { value: 2, label: '周二' },
                { value: 3, label: '周三' },
                { value: 4, label: '周四' },
                { value: 5, label: '周五' },
            ];
        },
        scheduleRows() {
            const slots = this.results.map(item => ({
                key: `${item.start_time}-${item.end_time}`,
                start_time: item.start_time,
                end_time: item.end_time,
                label: `${item.start_time}-${item.end_time}`,
            }));
            return [...new Map(slots.map(item => [item.key, item])).values()]
                .sort((a, b) => String(a.start_time).localeCompare(String(b.start_time)));
        },
        courseDemandSummary() {
            return this.selectableCourses.map(course => {
                const related = this.requests.filter(item => item.course_id === course.course_id && item.status !== 'cancelled');
                return {
                    course_id: course.course_id,
                    course_name: course.course_name,
                    capacity: Number(course.capacity),
                    first: related.filter(item => Number(item.preference_level) === 1).length,
                    second: related.filter(item => Number(item.preference_level) === 2).length,
                    third: related.filter(item => Number(item.preference_level) === 3).length,
                    total: related.length,
                };
            }).sort((a, b) => b.total - a.total);
        },
        rankedStudentRequests() {
            return [...this.activeRequests].sort((a, b) => Number(a.preference_level) - Number(b.preference_level));
        },
        studentPreferenceQueue() {
            const max = Math.max(1, Number(this.localSettings.maxPreferences || 3));
            return Array.from({ length: max }, (_, index) => {
                const level = index + 1;
                const matches = this.rankedStudentRequests.filter(item => Number(item.preference_level) === level);
                const request = matches[0] || null;
                const titles = {
                    1: '先确定最想上的课程',
                    2: '准备可接受的备选课程',
                    3: '补充兜底课程降低落选风险',
                };
                return {
                    level,
                    request,
                    duplicateCount: matches.length,
                    title: titles[level] || `补充第 ${level} 个备选`,
                    advice: level === 1 ? '建议选择最符合培养方向或兴趣方向的教学班。' : '可选择时间、教师或容量更稳妥的教学班。',
                };
            });
        },
        hottestCourse() {
            return this.demandCourses[0] || null;
        },
        largestGapCourse() {
            return [...this.selectableCourses]
                .sort((a, b) => this.demandGap(b) - this.demandGap(a))
                .find(course => this.demandGap(course) > 0) || null;
        },
        schedulableCourseCount() {
            return this.selectableCourses.filter(course => (
                this.openSections(course).length > 0 &&
                this.openSections(course).every(section => section.teacher_id && section.preferred_building && Number(section.capacity)) &&
                Number(course.active_request_count) <= Number(course.capacity)
            )).length;
        },
        studentProfiles() {
            const grouped = {};
            this.requests.forEach(item => {
                if (!grouped[item.student_id]) grouped[item.student_id] = [];
                grouped[item.student_id].push(item);
            });
            return Object.entries(grouped).map(([studentId, items]) => {
                const active = items.filter(item => item.status !== 'cancelled');
                const scheduled = items.filter(item => item.status === 'scheduled');
                const waitlisted = items.filter(item => item.status === 'waitlisted');
                const first = active.find(item => Number(item.preference_level) === 1);
                let riskLabel = '正常';
                let riskClass = 'ok';
                let advice = '意向结构正常。';
                if (!first) {
                    riskLabel = '缺少第一意向';
                    riskClass = 'warn';
                    advice = '建议提醒学生补充第一意向。';
                } else if (active.length > Number(this.localSettings.maxPreferences || 3)) {
                    riskLabel = '意向过多';
                    riskClass = 'warn';
                    advice = '建议学生收敛意向数量。';
                } else if (waitlisted.length) {
                    riskLabel = '存在候补';
                    riskClass = 'warn';
                    advice = '建议关注候补教学班容量，必要时增开平行班。';
                } else if (!scheduled.length && this.results.length) {
                    riskLabel = '暂未排中';
                    riskClass = 'danger';
                    advice = '建议关注候补或调整课程容量。';
                }
                return {
                    student_id: studentId,
                    active_count: active.length,
                    first_choice: first ? first.course_name : '',
                    scheduled_count: scheduled.length,
                    waitlisted_count: waitlisted.length,
                    risk_label: riskLabel,
                    risk_class: riskClass,
                    advice,
                };
            }).sort((a, b) => b.active_count - a.active_count);
        }
    },
    async mounted() {
        if (this.token) {
            localStorage.setItem('course_schedule_token', this.token);
            await this.loadMe();
        }
        this.loading = false;
    },
    methods: {
        authHeaders(extra = {}) {
            return { ...extra, Authorization: `Bearer ${this.token}` };
        },
        async api(path, options = {}) {
            const headers = options.headers || {};
            const res = await fetch(path, { ...options, headers: this.authHeaders(headers) });
            const data = await res.json();
            if (!res.ok || data.success === false) {
                throw new Error(data.message || '请求失败');
            }
            return data.data === undefined ? data : data.data;
        },
        async loadMe() {
            try {
                this.user = await this.api('/api/course-schedule/me');
                if (this.user.user_type === 'student') await this.loadStudentData();
                if (this.user.user_type === 'admin') await this.loadAdminData();
                if (this.user.user_type === 'teacher') await this.loadTeacherData();
            } catch (err) {
                this.errorMsg = err.message;
            }
        },
        initPreferenceDrafts() {
            this.courses.forEach(course => {
                if (!this.preferenceDrafts[course.course_id]) this.preferenceDrafts[course.course_id] = '1';
                const existingRequest = this.activeRequests.find(item => item.course_id === course.course_id && item.section_id);
                const sections = this.openSections(course);
                const currentSectionId = this.sectionDrafts[course.course_id];
                const currentSectionValid = sections.some(section => section.section_id === currentSectionId);
                if (existingRequest) {
                    this.sectionDrafts[course.course_id] = existingRequest.section_id;
                } else if (!currentSectionValid && sections.length) {
                    this.sectionDrafts[course.course_id] = sections[0].section_id;
                }
            });
        },
        async loadStudentData() {
            try {
                const [settings, profile, courses, requests, results] = await Promise.all([
                    this.api('/api/course-schedule/settings'),
                    this.api('/api/course-schedule/student-profile'),
                    this.api('/api/course-schedule/courses'),
                    this.api('/api/course-schedule/my-requests'),
                    this.api('/api/course-schedule/results')
                ]);
                this.localSettings = { ...DEFAULT_SETTINGS, ...settings };
                this.settingsDraft = { ...this.localSettings };
                this.studentProfile = profile;
                this.courses = courses;
                this.requests = requests;
                this.results = results;
                this.initPreferenceDrafts();
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async loadAdminData() {
            try {
                const [settings, courses, requests, results, timeSlots, classrooms] = await Promise.all([
                    this.api('/api/course-schedule/settings'),
                    this.api('/api/course-schedule/courses'),
                    this.api('/api/course-schedule/requests'),
                    this.api('/api/course-schedule/results'),
                    this.api('/api/course-schedule/time-slots'),
                    this.api('/api/course-schedule/classrooms')
                ]);
                this.localSettings = { ...DEFAULT_SETTINGS, ...settings };
                this.settingsDraft = { ...this.localSettings };
                this.courses = courses;
                this.requests = requests;
                this.results = results;
                this.timeSlots = timeSlots;
                this.classrooms = classrooms;
                this.initPreferenceDrafts();
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async loadTeacherData() {
            try {
                const [settings, sections, requests, results, timeSlots] = await Promise.all([
                    this.api('/api/course-schedule/settings'),
                    this.api('/api/course-schedule/teacher/sections'),
                    this.api('/api/course-schedule/teacher/requests'),
                    this.api('/api/course-schedule/results'),
                    this.api('/api/course-schedule/time-slots')
                ]);
                this.localSettings = { ...DEFAULT_SETTINGS, ...settings };
                this.settingsDraft = { ...this.localSettings };
                this.teacherSections = sections;
                this.teacherRequests = requests;
                this.results = results;
                this.timeSlots = timeSlots;
            } catch (err) {
                this.showToast(err.message);
            }
        },
        hasRequested(courseId) {
            return this.requests.some(item => item.course_id === courseId && item.status !== 'cancelled');
        },
        isScheduled(courseId) {
            return this.requests.some(item => item.course_id === courseId && item.status === 'scheduled');
        },
        hasPreference(level) {
            return this.activeRequests.some(item => Number(item.preference_level) === Number(level));
        },
        preferenceConflict(courseId, preferenceLevel) {
            return this.activeRequests.find(item => (
                item.course_id !== courseId
                && Number(item.preference_level) === Number(preferenceLevel)
            ));
        },
        openSections(course) {
            return (course.sections || []).filter(section => section.status === 'open');
        },
        selectedSection(courseId) {
            const course = this.courseById(courseId);
            const sectionId = this.sectionDrafts[courseId];
            return (course.sections || []).find(section => section.section_id === sectionId) || null;
        },
        sectionById(sectionId) {
            if (!sectionId) return {};
            for (const course of this.courses) {
                const section = (course.sections || []).find(item => item.section_id === sectionId);
                if (section) return section;
            }
            return {};
        },
        requestSection(item) {
            return this.sectionById(item.section_id);
        },
        sectionSummary(course) {
            const sections = this.openSections(course);
            if (!sections.length) return this.isRequiredCourse(course) ? '必修课计划内保障' : '暂无开放教学班';
            return sections.map(section => `${section.section_name}/教师${section.teacher_id || '待分配'}/${section.required_room_type || '普通教室'}/余${section.remaining_capacity}`).join('；');
        },
        adminSectionSummary(course) {
            const sections = course.sections || [];
            if (!sections.length) return '暂无教学班';
            const totalRemaining = sections.reduce((sum, section) => sum + Number(section.remaining_capacity || 0), 0);
            const detail = sections.map(section => {
                const statusText = section.status === 'open' ? '开放' : '停开';
                return `${section.section_name}(${statusText}) 报${section.active_request_count || 0}/${section.capacity || 0} 余${section.remaining_capacity || 0}`;
            }).join('；');
            return `合计余量 ${totalRemaining}；${detail}`;
        },
        slotLabelById(slotId) {
            const slot = this.timeSlots.find(item => Number(item.slot_id) === Number(slotId));
            return slot ? `${slot.label || ('周' + slot.weekday)} ${slot.start_time}-${slot.end_time}` : `时间段${slotId}`;
        },
        slotIdList(value) {
            return String(value || '')
                .replace(/，/g, ',')
                .split(',')
                .map(item => item.trim())
                .filter(Boolean);
        },
        unavailableSlotLabels(section) {
            const ids = section.unavailable_slot_id_list || this.slotIdList(section.unavailable_slot_ids);
            if (!ids.length) return '无';
            return ids.map(id => this.slotLabelById(id)).join('；');
        },
        teacherSlotSelected(slotId) {
            return this.slotIdList(this.teacherAvailabilityDraft.unavailable_slot_ids)
                .some(id => Number(id) === Number(slotId));
        },
        toggleTeacherSlot(slotId) {
            const selected = new Set(this.slotIdList(this.teacherAvailabilityDraft.unavailable_slot_ids).map(id => String(id)));
            const key = String(slotId);
            if (selected.has(key)) {
                selected.delete(key);
            } else {
                selected.add(key);
            }
            this.teacherAvailabilityDraft.unavailable_slot_ids = [...selected]
                .sort((a, b) => Number(a) - Number(b))
                .join(',');
        },
        slotSelectedInDraft(draft, slotId) {
            return this.slotIdList(draft.unavailable_slot_ids).some(id => Number(id) === Number(slotId));
        },
        toggleSlotInDraft(draft, slotId) {
            const selected = new Set(this.slotIdList(draft.unavailable_slot_ids).map(id => String(id)));
            const key = String(slotId);
            if (selected.has(key)) {
                selected.delete(key);
            } else {
                selected.add(key);
            }
            draft.unavailable_slot_ids = [...selected]
                .sort((a, b) => Number(a) - Number(b))
                .join(',');
        },
        sectionFormSlotSelected(slotId) {
            return this.slotSelectedInDraft(this.sectionForm, slotId);
        },
        toggleSectionFormSlot(slotId) {
            this.toggleSlotInDraft(this.sectionForm, slotId);
        },
        sectionDraftSlotSelected(slotId) {
            return this.slotSelectedInDraft(this.sectionDraft, slotId);
        },
        toggleSectionDraftSlot(slotId) {
            this.toggleSlotInDraft(this.sectionDraft, slotId);
        },
        capacityPercent(course) {
            if (!course.capacity) return 0;
            return Math.min(100, Math.round((Number(course.active_request_count) / Number(course.capacity)) * 100));
        },
        capacityClass(course) {
            const percent = this.capacityPercent(course);
            if (Number(course.active_request_count) > Number(course.capacity)) return 'danger';
            if (percent >= 80) return 'warn';
            return 'ok';
        },
        capacityLabel(course) {
            if (Number(course.active_request_count) > Number(course.capacity)) return '超容量';
            if (this.capacityPercent(course) >= 80) return '名额紧张';
            return '名额充足';
        },
        statusClass(status) {
            if (status === 'scheduled') return 'ok';
            if (status === 'waitlisted') return 'warn';
            if (status === 'cancelled') return 'danger';
            if (status === 'approved') return 'ok';
            if (status === 'rejected') return 'danger';
            return 'warn';
        },
        requestStatusLabel(item) {
            const labels = {
                submitted: '已提交',
                scheduled: '已排课',
                waitlisted: '候补中',
                cancelled: '已撤销',
                approved: '历史已通过',
                rejected: '历史已拒绝',
                pending: '历史待审核',
            };
            return item.status_label || labels[item.status] || item.status || '';
        },
        requestStatusText(item) {
            if (item.status === 'waitlisted' && item.waitlist_rank) {
                return `候补中 第 ${item.waitlist_rank}/${item.waitlist_total}`;
            }
            return this.requestStatusLabel(item);
        },
        formatTime(value) {
            if (!value) return '-';
            return String(value).replace('T', ' ').slice(0, 16);
        },
        courseType(course) {
            const code = String(course.course_id || '').toUpperCase();
            const name = String(course.course_name || '');
            if (code.startsWith('PUB') || name.includes('公共') || name.includes('体育') || name.includes('英语') || name.includes('思政')) {
                return { key: 'public', label: '公共课', rule: '面向多专业，建议作为通识或公共培养要求补充。' };
            }
            const requiredKeywords = ['必修', '基础', '高等数学', '大学物理', '程序设计', '面向对象', '数字逻辑', '微机原理', '信号与系统', '通信原理'];
            if (code.startsWith('REQ') || requiredKeywords.some(keyword => name.includes(keyword))) {
                return { key: 'required', label: '必修课', rule: '培养方案内课程，由系统优先保障，不参与学生意向排序。' };
            }
            return { key: 'elective', label: '专业选修课', rule: '按兴趣方向选择，建议保留备选课程。' };
        },
        isRequiredCourse(course) {
            return this.courseType(course).key === 'required';
        },
        phaseName(phase, fallback = '') {
            return {
                preselect: '预选/意向征集',
                selecting: '正式选课阶段',
                scheduling: '排课处理阶段',
                add_drop: '补退选阶段',
                final: '管理员最终确认',
                closed: '选课关闭',
            }[phase] || fallback || phase || '';
        },
        splitRuleValues(value) {
            if (!value || String(value).toLowerCase() === 'all') return [];
            return String(value).replace(/，/g, ',').split(',').map(item => item.trim()).filter(Boolean);
        },
        eligibilitySummary(course) {
            const majors = this.splitRuleValues(course.allowed_majors);
            const grades = this.splitRuleValues(course.allowed_grades);
            const majorText = majors.length ? majors.join('、') : '不限专业';
            const gradeText = grades.length ? grades.join('、') + '级' : '不限年级';
            return `${majorText} · ${gradeText} · 先修：${course.prerequisite_note || '无'}`;
        },
        courseEligibility(course) {
            const majors = this.splitRuleValues(course.allowed_majors);
            const grades = this.splitRuleValues(course.allowed_grades);
            if (majors.length && !majors.includes(this.studentProfile.major)) return { ok: false, label: '专业不符' };
            if (grades.length && !grades.includes(this.studentProfile.grade)) return { ok: false, label: '年级不符' };
            return { ok: true, label: '符合范围' };
        },
        courseAdvice(course) {
            const eligibility = this.courseEligibility(course);
            if (!eligibility.ok) return `当前学生${eligibility.label}，不可提交该课程意向。`;
            if (this.isRequiredCourse(course)) return '必修课通常由培养方案统一保障，学生无需按选课意向抢选。';
            if (Number(course.active_request_count) > Number(course.capacity)) return '报名人数已超过容量，建议同时选择备选课程。';
            if (this.capacityPercent(course) >= 80) return '课程热度较高，建议尽早提交并保留备选意向。';
            return '当前容量相对充足，可按兴趣和时间偏好选择。';
        },
        adminAdvice(course) {
            const sections = this.openSections(course);
            if (!sections.length) return '建议先创建或开放至少一个教学班。';
            if (sections.some(section => Number(section.active_request_count) > Number(section.capacity))) return '建议扩容、增开平行班或提前沟通候补规则。';
            if (sections.some(section => !section.teacher_id)) return '建议补充教学班授课教师。';
            if (sections.some(section => !section.preferred_building)) return '建议设置教学班偏好楼栋以优化通勤距离。';
            return '供需基本正常，可进入排课。';
        },
        courseById(courseId) {
            return this.courses.find(course => course.course_id === courseId) || {};
        },
        courseCode(item) {
            if (!item) return '';
            if (item.course_code) return item.course_code;
            const course = this.courseById(item.course_id);
            return course.course_code || item.course_id || '';
        },
        demandGap(course) {
            return Math.max(0, Number(course.active_request_count || 0) - Number(course.capacity || 0));
        },
        admissionRisk(item) {
            const section = this.requestSection(item);
            if (!section.section_id) return '暂无教学班数据';
            if (Number(section.active_request_count) > Number(section.capacity)) return '竞争较高，可能进入候补';
            if (Number(section.capacity) && Math.round((Number(section.active_request_count) / Number(section.capacity)) * 100) >= 80) return '名额紧张，建议保留备选';
            return '风险较低';
        },
        timetableItems(weekday, slot) {
            return this.results.filter(item => (
                Number(item.weekday) === Number(weekday) &&
                item.start_time === slot.start_time &&
                item.end_time === slot.end_time
            ));
        },
        pushAudit(action, detail) {
            const item = {
                id: `${Date.now()}-${Math.random()}`,
                action,
                detail,
                time: new Date().toLocaleString(),
            };
            this.auditLog = [item, ...this.auditLog].slice(0, 30);
            localStorage.setItem('course_schedule_audit_log', JSON.stringify(this.auditLog));
        },
        async submitRequest(course) {
            try {
                if (!this.isSelectionOpen) {
                    this.showToast(`当前选课批次${this.selectionWindowState.label}，暂不能提交意向`);
                    return;
                }
                if (this.isRequiredCourse(course)) {
                    this.showToast('必修课属于培养方案保障课程，不需要提交选课意向');
                    return;
                }
                const eligibility = this.courseEligibility(course);
                if (!eligibility.ok) {
                    this.showToast(`当前学生${eligibility.label}，不能提交该课程意向`);
                    return;
                }
                const section = this.selectedSection(course.course_id);
                if (!section) {
                    this.showToast('请先选择具体教学班');
                    return;
                }
                const preferenceLevel = this.preferenceDrafts[course.course_id] || 1;
                const conflict = this.preferenceConflict(course.course_id, preferenceLevel);
                if (conflict) {
                    this.showToast(`${conflict.course_name || conflict.course_id} 已经是第 ${preferenceLevel} 意向，请先调整或撤销原意向`);
                    return;
                }
                await this.api('/api/course-schedule/requests', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        course_id: course.course_id,
                        section_id: section.section_id,
                        preference_level: preferenceLevel
                    })
                });
                await this.loadStudentData();
                this.showToast('选课申请已提交');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async cancelRequest(item) {
            if (!confirm(`确认撤销 ${item.course_name} 的选课申请？`)) return;
            try {
                await this.api(`/api/course-schedule/requests/${item.id}`, { method: 'DELETE' });
                await this.loadStudentData();
                this.showToast('选课申请已撤销');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async createCourse() {
            try {
                const createdCourse = { ...this.courseForm };
                await this.api('/api/course-schedule/courses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.courseForm)
                });
                this.courseForm = { course_id: '', course_name: '', teacher_id: '', capacity: 40, credits: 2, hours_per_week: 2, preferred_building: '', allowed_majors: 'all', allowed_grades: 'all', prerequisite_note: '无', status: 'open' };
                await this.loadAdminData();
                this.pushAudit('新增课程', `${createdCourse.course_name || createdCourse.course_id} 已创建`);
                this.showToast('课程已新增');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async toggleCourseStatus(course) {
            try {
                await this.api(`/api/course-schedule/courses/${course.course_id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...course, status: course.status === 'open' ? 'closed' : 'open' })
                });
                await this.loadAdminData();
                this.pushAudit(course.status === 'open' ? '停止选课' : '开放选课', `${course.course_name}（${course.course_id}）`);
                this.showToast(course.status === 'open' ? '课程已停止选课' : '课程已开放选课');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        startEditCourse(course) {
            this.editingCourseId = course.course_id;
            this.courseDraft = {
                course_name: course.course_name,
                teacher_id: course.teacher_id || '',
                capacity: course.capacity,
                credits: course.credits || course.hours_per_week || 2,
                hours_per_week: course.hours_per_week,
                preferred_building: course.preferred_building || '',
                allowed_majors: course.allowed_majors || 'all',
                allowed_grades: course.allowed_grades || 'all',
                prerequisite_note: course.prerequisite_note || '无',
                status: course.status,
            };
        },
        cancelEditCourse() {
            this.editingCourseId = '';
            this.courseDraft = {};
        },
        async saveCourse(course) {
            try {
                await this.api(`/api/course-schedule/courses/${course.course_id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.courseDraft)
                });
                this.cancelEditCourse();
                await this.loadAdminData();
                this.pushAudit('编辑课程', `${course.course_name}（${course.course_id}）`);
                this.showToast('课程信息已保存');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async deleteCourse(course) {
            if (!confirm(`确认删除 ${course.course_name}？相关申请和排课结果也会删除。`)) return;
            try {
                await this.api(`/api/course-schedule/courses/${course.course_id}`, { method: 'DELETE' });
                await this.loadAdminData();
                this.pushAudit('删除课程', `${course.course_name}（${course.course_id}）`);
                this.showToast('课程已删除');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async createSection() {
            try {
                if (!this.sectionForm.course_id) {
                    this.showToast('请先选择所属课程');
                    return;
                }
                const course = this.courseById(this.sectionForm.course_id);
                const sectionName = this.sectionForm.section_name || `${course.course_name || this.sectionForm.course_id} ${(course.sections || []).length + 1}`; 
                await this.api(`/api/course-schedule/courses/${this.sectionForm.course_id}/sections`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...this.sectionForm, section_name: sectionName })
                });
                this.sectionForm = { course_id: this.sectionForm.course_id, section_name: '', teacher_id: '', capacity: 40, preferred_building: '', required_room_type: '普通教室', unavailable_slot_ids: '', status: 'open' };
                await this.loadAdminData();
                this.pushAudit('新增教学班', `${course.course_name || this.sectionForm.course_id} · ${sectionName}`);
                this.showToast('教学班已新增');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        startEditSection(section) {
            this.editingSectionId = section.section_id;
            this.sectionDraft = {
                section_name: section.section_name,
                teacher_id: section.teacher_id || '',
                capacity: section.capacity,
                preferred_building: section.preferred_building || '',
                required_room_type: section.required_room_type || '普通教室',
                unavailable_slot_ids: section.unavailable_slot_ids || '',
                status: section.status,
            };
        },
        cancelEditSection() {
            this.editingSectionId = '';
            this.sectionDraft = {};
        },
        async saveSection(section) {
            try {
                await this.api(`/api/course-schedule/sections/${section.section_id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.sectionDraft)
                });
                this.cancelEditSection();
                await this.loadAdminData();
                this.pushAudit('编辑教学班', `${section.section_name}（${section.section_id}）`);
                this.showToast('教学班信息已保存');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async toggleSectionStatus(section) {
            try {
                await this.api(`/api/course-schedule/sections/${section.section_id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...section, status: section.status === 'open' ? 'closed' : 'open' })
                });
                await this.loadAdminData();
                this.pushAudit(section.status === 'open' ? '停止教学班选课' : '开放教学班选课', `${section.section_name}（${section.section_id}）`);
                this.showToast(section.status === 'open' ? '教学班已停止选课' : '教学班已开放选课');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async deleteSection(section) {
            if (!confirm(`确认删除 ${section.section_name}？已有申请或排课结果的教学班不能删除。`)) return;
            try {
                await this.api(`/api/course-schedule/sections/${section.section_id}`, { method: 'DELETE' });
                await this.loadAdminData();
                this.pushAudit('删除教学班', `${section.section_name}（${section.section_id}）`);
                this.showToast('教学班已删除');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        startEditScheduleResult(item) {
            this.editingResultId = item.id;
            this.resultDraft = {
                classroom_id: item.classroom_id,
                slot_id: item.slot_id,
            };
        },
        cancelEditScheduleResult() {
            this.editingResultId = '';
            this.resultDraft = {};
        },
        async saveScheduleResult(item) {
            try {
                await this.api(`/api/course-schedule/results/${item.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.resultDraft)
                });
                this.cancelEditScheduleResult();
                await this.loadAdminData();
                this.pushAudit('人工调整排课', `${item.course_name} · ${item.section_name || item.section_id}`);
                this.showToast('排课结果已调整，请复核冲突后重新发布');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        startEditTeacherAvailability(section) {
            this.editingTeacherSectionId = section.section_id;
            this.teacherAvailabilityDraft = {
                unavailable_slot_ids: section.unavailable_slot_ids || '',
            };
        },
        cancelEditTeacherAvailability() {
            this.editingTeacherSectionId = '';
            this.teacherAvailabilityDraft = {};
        },
        async saveTeacherAvailability(section) {
            try {
                await this.api(`/api/course-schedule/teacher/sections/${section.section_id}/availability`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.teacherAvailabilityDraft)
                });
                this.cancelEditTeacherAvailability();
                await this.loadTeacherData();
                this.showToast('不可用时间已保存，后续排课会参考该约束');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async createTimeSlot() {
            try {
                const createdSlot = { ...this.slotForm };
                await this.api('/api/course-schedule/time-slots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.slotForm)
                });
                this.slotForm = { weekday: 1, start_time: '08:00', end_time: '09:40', label: '' };
                await this.loadAdminData();
                this.pushAudit('新增时间段', `周${createdSlot.weekday} ${createdSlot.start_time}-${createdSlot.end_time}`);
                this.showToast('时间段已新增');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        async runSchedule() {
            if (this.scheduleRunning) return;
            if (!this.canGenerateSchedule) {
                this.showToast(this.scheduleBlockText);
                return;
            }
            this.scheduleRunning = true;
            this.showToast('正在生成排课方案，请稍候...');
            try {
                await this.api('/api/course-schedule/agent/schedule', { method: 'POST' });
                this.adminTab = 'schedule';
                await this.loadAdminData();
                this.pushAudit('生成排课方案', `生成 ${this.results.length} 条排课结果`);
                this.showToast('排课方案已生成');
            } catch (err) {
                const detail = this.scheduleBlockReasons.length ? `${err.message}：${this.scheduleBlockText}` : err.message;
                this.showToast(detail);
            } finally {
                this.scheduleRunning = false;
            }
        },
        async publishResults() {
            const extra = this.scheduleConflicts.length ? `\n当前仍有 ${this.scheduleConflicts.length} 个教室时间冲突。` : '';
            const missing = this.unscheduledCourses.length ? `\n仍有 ${this.unscheduledCourses.length} 门有申请课程未排课。` : '';
            if (!confirm(`确认发布 ${this.results.length} 条排课结果？发布后学生端将可查看。${extra}${missing}`)) return;
            try {
                await this.api('/api/course-schedule/results/publish', { method: 'POST' });
                this.adminTab = 'schedule';
                await this.loadAdminData();
                this.pushAudit('发布排课结果', `发布 ${this.results.length} 条排课结果`);
                this.showToast('排课结果已发布');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        printSchedule() {
            window.print();
        },
        exportRequestsCsv() {
            const rows = [['学生', '课程编号', '课程名称', '教学班', '授课教师', '意向', '状态', '提交时间']];
            this.filteredRequests.forEach(item => rows.push([
                item.student_id,
                this.courseCode(item),
                item.course_name,
                item.section_name || '',
                item.section_teacher_id || '',
                item.preference_label,
                this.requestStatusText(item),
                this.formatTime(item.created_at)
            ]));
            this.downloadCsv('选课意向.csv', rows);
        },
        exportResultsCsv() {
            const rows = [['课程编号', '课程名称', '教学班', '授课教师', '教室', '星期', '开始', '结束', '人数', '评分', '发布状态', '说明']];
            this.results.forEach(item => rows.push([
                this.courseCode(item),
                item.course_name,
                item.section_name || '',
                item.section_teacher_id || '',
                item.classroom_id,
                item.weekday_label,
                item.start_time,
                item.end_time,
                item.enrolled_count,
                item.score,
                item.is_published ? '已发布' : '待发布',
                item.reason || ''
            ]));
            this.downloadCsv('排课结果.csv', rows);
        },
        exportDemandCsv() {
            const rows = [['课程编号', '课程名称', '第一意向', '第二意向', '第三意向', '总需求', '容量', '缺口', '建议']];
            this.courseDemandSummary.forEach(item => {
                const course = this.courseById(item.course_id);
                rows.push([
                    this.courseCode(item),
                    item.course_name,
                    item.first,
                    item.second,
                    item.third,
                    item.total,
                    item.capacity,
                    this.demandGap(course),
                    this.adminAdvice(course)
                ]);
            });
            this.downloadCsv('选课需求分析.csv', rows);
        },
        exportStudentProfilesCsv() {
            const rows = [['学生', '有效意向', '第一意向', '已排课程', '候补课程', '风险', '建议']];
            this.studentProfiles.forEach(item => rows.push([
                item.student_id,
                item.active_count,
                item.first_choice,
                item.scheduled_count,
                item.waitlisted_count,
                item.risk_label,
                item.advice
            ]));
            this.downloadCsv('学生选课画像.csv', rows);
        },
        exportTeacherRequestsCsv() {
            const rows = [['学生', '课程编号', '课程名称', '教学班', '意向', '状态', '提交时间']];
            this.teacherRequests.forEach(item => rows.push([
                item.student_id,
                this.courseCode(item),
                item.course_name,
                item.section_name || item.section_id || '',
                item.preference_label,
                this.requestStatusText(item),
                this.formatTime(item.created_at)
            ]));
            this.downloadCsv('教师教学班报名名单.csv', rows);
        },
        exportAuditLogCsv() {
            const rows = [['操作', '时间', '详情']];
            this.auditLog.forEach(item => rows.push([item.action, item.time, item.detail]));
            this.downloadCsv('选课管理操作记录.csv', rows);
        },
        async saveLocalSettings() {
            try {
                const settings = await this.api('/api/course-schedule/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.settingsDraft)
                });
                this.localSettings = { ...DEFAULT_SETTINGS, ...settings };
                this.settingsDraft = { ...this.localSettings };
                this.pushAudit('保存批次设置', `${this.localSettings.termName} · ${this.localSettings.phaseLabel}`);
                this.showToast('批次设置已保存');
            } catch (err) {
                this.showToast(err.message);
            }
        },
        clearAuditLog() {
            this.auditLog = [];
            localStorage.removeItem('course_schedule_audit_log');
        },
        downloadCsv(filename, rows) {
            const csv = rows.map(row => row.map(value => `"${String(value ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        },
        showToast(message) {
            this.toast = message;
            clearTimeout(this.toastTimer);
            this.toastTimer = setTimeout(() => { this.toast = ''; }, 2600);
        }
    }
}).mount('#app');
</script>
</body>
</html>
