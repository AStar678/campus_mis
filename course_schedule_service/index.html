<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课与智能排课系统</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #f4f6f8;
            color: #1f2933;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }
        button, input, select { font: inherit; }
        button { cursor: pointer; border: 0; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: center;
            padding: 16px 28px;
            background: #fff;
            border-bottom: 1px solid #dce3ea;
        }
        .brand h1 { font-size: 20px; color: #174f8c; }
        .brand p, .muted, .user-chip { color: #617080; font-size: 13px; line-height: 1.5; }
        .workspace {
            width: min(1240px, 100%);
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 18px;
        }
        .panel, .course-card, .stat, .notice {
            background: #fff;
            border: 1px solid #dce3ea;
            border-radius: 8px;
        }
        .panel { padding: 18px; }
        .notice { padding: 14px; background: #fbfcfd; }
        .section-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }
        .section-head h2 { font-size: 18px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
        .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
        .stat { padding: 14px; }
        .stat strong { display: block; font-size: 24px; margin-top: 4px; }
        .course-card { padding: 14px; display: grid; gap: 12px; }
        .course-title { font-weight: 700; font-size: 16px; }
        .meta-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 2px 8px;
            border-radius: 999px;
            background: #edf5ff;
            color: #174f8c;
            font-size: 12px;
        }
        .pill.warn { background: #fff4de; color: #946200; }
        .pill.ok { background: #e8f5ee; color: #276749; }
        .pill.danger { background: #fdecea; color: #a6332d; }
        .progress {
            height: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: #e7ecf1;
        }
        .progress span { display: block; height: 100%; background: #2364aa; }
        .progress span.warn { background: #d97706; }
        .progress span.danger { background: #c2413a; }
        .field { display: grid; gap: 6px; margin-bottom: 12px; }
        .field label { color: #52616f; font-size: 13px; }
        .field input, .field select {
            width: 100%;
            border: 1px solid #cfd7df;
            border-radius: 6px;
            padding: 9px 10px;
            background: #fff;
        }
        .filters { display: grid; grid-template-columns: minmax(220px, 1fr) 180px 180px; gap: 10px; align-items: end; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            border-radius: 6px;
            padding: 7px 12px;
            color: #fff;
            background: #2364aa;
        }
        .btn:hover { background: #174f8c; }
        .btn:disabled { background: #a8b3bf; cursor: not-allowed; }
        .btn.secondary { color: #1f2933; background: #e7ecf1; }
        .btn.success { background: #2f855a; }
        .btn.danger { background: #c2413a; }
        .empty {
            padding: 28px;
            text-align: center;
            color: #617080;
            border: 1px dashed #b9c6d3;
            border-radius: 8px;
            background: #f8fafc;
        }
        .table-wrap { overflow-x: auto; border: 1px solid #dce3ea; border-radius: 8px; }
        table { width: 100%; min-width: 820px; border-collapse: collapse; background: #fff; }
        th, td { padding: 10px 12px; border-bottom: 1px solid #e7ecf1; text-align: left; vertical-align: top; }
        th { color: #52616f; background: #f7f9fb; font-size: 13px; }
        tr:last-child td { border-bottom: 0; }
        .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab {
            color: #334e68;
            background: #dbe5ee;
            border-radius: 6px;
            padding: 8px 12px;
        }
        .tab.active { color: #fff; background: #2364aa; }
        .timeline { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
        .step { padding: 12px; background: #f8fafc; border: 1px solid #dce3ea; border-radius: 8px; }
        .step strong { display: block; margin-bottom: 4px; }
        .check-list { display: grid; gap: 8px; }
        .check-item { display: flex; justify-content: space-between; gap: 10px; align-items: center; padding: 10px 12px; background: #f8fafc; border: 1px solid #dce3ea; border-radius: 8px; }
        .inline-edit { display: grid; gap: 8px; min-width: 180px; }
        .inline-edit input {
            width: 100%;
            border: 1px solid #cfd7df;
            border-radius: 6px;
            padding: 7px 8px;
            background: #fff;
        }
        .slot-picker { display: grid; grid-template-columns: repeat(2, minmax(150px, 1fr)); gap: 6px; min-width: 330px; }
        .slot-option {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 8px;
            border: 1px solid #dce3ea;
            border-radius: 6px;
            background: #fff;
            font-size: 13px;
            color: #334e68;
        }
        .slot-option input { width: auto; }
        .summary-list { display: grid; gap: 10px; }
        .summary-item {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) 120px 120px 120px 140px;
            gap: 10px;
            align-items: center;
            padding: 12px;
            background: #f8fafc;
            border: 1px solid #dce3ea;
            border-radius: 8px;
        }
        .profile-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .profile-card { padding: 12px; background: #f8fafc; border: 1px solid #dce3ea; border-radius: 8px; }
        .profile-card strong { display: block; margin-bottom: 8px; }
        .preference-queue { display: grid; gap: 8px; margin-top: 12px; }
        .preference-row { display: grid; grid-template-columns: 120px minmax(0, 1fr) 180px; gap: 12px; align-items: center; padding: 12px; background: #f8fafc; border: 1px solid #dce3ea; border-radius: 8px; }
        .preference-row.empty { background: #fff; border-style: dashed; }
        .preference-row strong { display: block; margin-bottom: 4px; }
        .preference-meta { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
        .audit-list { display: grid; gap: 8px; max-height: 260px; overflow: auto; }
        .audit-item { padding: 10px 12px; background: #f8fafc; border: 1px solid #dce3ea; border-radius: 8px; }
        .timetable {
            display: grid;
            grid-template-columns: 90px repeat(5, minmax(0, 1fr));
            border: 1px solid #dce3ea;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        .time-cell {
            min-height: 72px;
            padding: 10px;
            border-right: 1px solid #e7ecf1;
            border-bottom: 1px solid #e7ecf1;
            background: #fff;
        }
        .time-cell.header { min-height: auto; background: #f7f9fb; color: #52616f; font-weight: 700; font-size: 13px; }
        .time-cell.slot { background: #f7f9fb; color: #52616f; font-size: 13px; }
        .time-card { padding: 8px; border-radius: 6px; background: #edf5ff; color: #174f8c; font-size: 12px; line-height: 1.45; }
        .toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: #fff;
            background: #1f2933;
            padding: 10px 18px;
            border-radius: 6px;
            box-shadow: 0 12px 30px rgba(0,0,0,.2);
        }
        @media (max-width: 900px) {
            .top-bar { align-items: flex-start; flex-direction: column; }
            .grid-2, .grid-3, .stats, .timeline, .filters { grid-template-columns: 1fr; }
            .workspace { padding: 16px; }
            .summary-item { grid-template-columns: 1fr; }
            .profile-grid { grid-template-columns: 1fr; }
            .preference-row { grid-template-columns: 1fr; }
            .preference-meta { justify-content: flex-start; }
            .slot-picker { grid-template-columns: 1fr; min-width: 0; }
            .timetable { grid-template-columns: 76px repeat(5, minmax(120px, 1fr)); overflow-x: auto; }
        }
        @media print {
            .top-bar, .actions, .tabs, .filters, .toast, .btn { display: none !important; }
            body { background: #fff; }
            .workspace { width: 100%; padding: 0; }
            .panel { border: 0; padding: 12px 0; }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="toast" v-if="toast">{{ toast }}</div>
    <header class="top-bar">
        <div class="brand">
            <h1>选课与智能排课系统</h1>
            <p>{{ termName }} · {{ phaseLabel }}</p>
        </div>
        <div class="user-chip" v-if="user.user_id">{{ user.user_id }} · {{ roleLabel }}</div>
    </header>

    <main class="workspace">
        <section class="panel" v-if="!token">
            <div class="empty">缺少登录 token，请从主服务大厅进入选课系统。</div>
        </section>

        <section class="panel" v-else-if="loading">
            <div class="empty">正在加载选课数据...</div>
        </section>

        <section class="panel" v-else-if="errorMsg">
            <div class="empty">{{ errorMsg }}</div>
        </section>

        <template v-else-if="user.user_type === 'student'">
            <section class="panel">
                <div class="section-head">
                    <div>
                        <h2>本轮选课</h2>
                        <p class="muted">必修课由培养方案保障；学生主要提交专业选修课和公共课的选课意向，管理员统一排课并发布结果。</p>
                    </div>
                    <button class="btn secondary" @click="loadStudentData">刷新</button>
                </div>
                <div class="stats">
                    <div class="stat"><span class="muted">可选教学班</span><strong>{{ selectableSectionCount }}</strong></div>
                    <div class="stat"><span class="muted">我的有效意向</span><strong>{{ activeRequests.length }}</strong></div>
                    <div class="stat"><span class="muted">已选学分</span><strong>{{ activeCredits }}</strong></div>
                    <div class="stat"><span class="muted">已排课申请</span><strong>{{ scheduledRequestCount }}</strong></div>
                    <div class="stat"><span class="muted">候补申请</span><strong>{{ waitlistedRequestCount }}</strong></div>
                </div>
            </section>

            <section class="panel">
                <div class="section-head">
                    <h2>选课流程</h2>
                    <span class="pill" :class="isSelectionOpen ? 'ok' : 'warn'">当前：{{ phaseLabel }} · {{ selectionWindowState.label }}</span>
                </div>
                <div class="timeline">
                    <div class="step"><strong>1. 浏览课程</strong><span class="muted">查看容量、教师、楼栋偏好</span></div>
                    <div class="step"><strong>2. 提交意向</strong><span class="muted">优先选择选修课和公共课</span></div>
                    <div class="step"><strong>3. 管理员排课</strong><span class="muted">综合容量、教室和通勤距离</span></div>
                    <div class="step"><strong>4. 查看结果</strong><span class="muted">结果发布后生成个人课表</span></div>
                </div>
            </section>

            <section class="panel">
                <div class="section-head">
                    <h2>选课意向体检</h2>
                    <span class="pill" :class="studentPlanWarnings.length ? 'warn' : 'ok'">{{ studentPlanWarnings.length ? studentPlanWarnings.length + ' 条提醒' : '方案正常' }}</span>
                </div>
                <div class="check-list">
                    <div class="check-item"><span>学生画像</span><span class="pill ok">{{ studentProfile.grade || '-' }}级 · {{ studentProfile.major || '-' }}</span></div>
                    <div class="check-item"><span>有效意向数量</span><span class="pill" :class="activeRequests.length > Number(localSettings.maxPreferences || 3) ? 'warn' : 'ok'">{{ activeRequests.length }} / {{ localSettings.maxPreferences || 3 }}</span></div>
                    <div class="check-item"><span>第一意向</span><span class="pill" :class="hasPreference(1) ? 'ok' : 'warn'">{{ hasPreference(1) ? '已填写' : '建议填写' }}</span></div>
                    <div class="check-item"><span>重复意向级别</span><span class="pill" :class="duplicatePreferenceLevels.length ? 'warn' : 'ok'">{{ duplicatePreferenceLevels.length ? duplicatePreferenceLevels.join('、') : '无重复' }}</span></div>
                    <div class="check-item"><span>公共课/选修课搭配</span><span class="pill" :class="hasBalancedCourseTypes ? 'ok' : 'warn'">{{ hasBalancedCourseTypes ? '结构合理' : '建议补充' }}</span></div>
                    <div class="check-item"><span>当前意向学分</span><span class="pill" :class="creditPlanStatus.className">{{ activeCredits }} / {{ localSettings.minCredits }}-{{ localSettings.maxCredits }} 学分</span></div>
                    <div class="check-item"><span>分类学分结构</span><span class="pill ok">专业 {{ creditBreakdown.elective }} · 公共 {{ creditBreakdown.public }}</span></div>
                    <div class="check-item"><span>已发布课表</span><span class="pill" :class="results.length ? 'ok' : 'warn'">{{ results.length ? results.length + ' 门' : '待发布' }}</span></div>
                </div>
                <div class="notice" v-if="studentPlanWarnings.length" style="margin-top: 12px;">
                    <div class="muted" v-for="item in studentPlanWarnings" :key="item">{{ item }}</div>
                </div>
                <div class="preference-queue">
                    <div class="preference-row" :class="{ empty: !slot.request }" v-for="slot in studentPreferenceQueue" :key="slot.level">
                        <div>
                            <strong>第 {{ slot.level }} 意向</strong>
                            <span class="pill" :class="slot.request ? statusClass(slot.request.status) : 'warn'">{{ slot.request ? requestStatusLabel(slot.request) : '待补充' }}</span>
                        </div>
                        <div v-if="slot.request">
                            <strong>{{ slot.request.course_name }}</strong>
                            <div class="muted">{{ slot.request.section_name || slot.request.section_id || '未指定教学班' }} · 教师 {{ slot.request.section_teacher_id || '待分配' }}</div>
                            <div class="muted">{{ courseCode(slot.request) }} · {{ courseType(courseById(slot.request.course_id)).label }} · {{ courseById(slot.request.course_id).credits || 0 }} 学分</div>
                        </div>
                        <div v-else>
                            <strong>{{ slot.title }}</strong>
                            <div class="muted">{{ slot.advice }}</div>
                        </div>
                        <div class="preference-meta">
                            <span class="pill" v-if="slot.request">报名 {{ requestSection(slot.request).active_request_count || 0 }}/{{ requestSection(slot.request).capacity || '-' }}</span>
                            <span class="pill" :class="slot.request && admissionRisk(slot.request).includes('低') ? 'ok' : 'warn'">{{ slot.request ? admissionRisk(slot.request) : '建议保留备选' }}</span>
                            <span class="pill danger" v-if="slot.duplicateCount > 1">同级重复 {{ slot.duplicateCount }} 门</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="section-head">
                    <h2>计划内必修课</h2>
                    <span class="muted">共 {{ requiredPlanCourses.length }} 门</span>
                </div>
                <div class="summary-list" v-if="requiredPlanCourses.length">
                    <div class="summary-item" v-for="course in requiredPlanCourses" :key="course.course_id">
                        <div>
                            <strong>{{ course.course_name }}</strong>
                            <div class="muted">{{ courseCode(course) }} · {{ course.hours_per_week }} 学时/周</div>
                        </div>
                        <span class="pill">培养方案保障</span>
                        <span class="pill">{{ course.preferred_building || '楼栋待定' }}</span>
                    </div>
                </div>
                <div class="empty" v-else>暂无计划内必修课。</div>
            </section>

            <section class="panel">
                <div class="section-head">
                    <h2>可提交意向的教学班</h2>
                    <span class="muted">共 {{ filteredSelectableCourses.length }} 门课程 / {{ filteredSelectableSectionCount }} 个教学班</span>
                </div>
                <div class="filters">
                    <div class="field">
                        <label>搜索课程</label>
                        <input v-model.trim="courseKeyword" placeholder="输入课程名、编号或教师">
                    </div>
                    <div class="field">
                        <label>筛选状态</label>
                        <select v-model="courseFilter">
                            <option value="all">全部可选课程</option>
                            <option value="available">仍有余量</option>
                            <option value="hot">报名紧张</option>
                            <option value="requested">我已申请</option>
                            <option value="elective">专业选修课</option>
                            <option value="public">公共课</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>排序</label>
                        <select v-model="courseSort">
                            <option value="code">按课程编号</option>
                            <option value="capacity">按剩余容量</option>
                            <option value="demand">按报名热度</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2" v-if="filteredSelectableCourses.length">
                    <article class="course-card" v-for="course in filteredSelectableCourses" :key="course.course_id">
                        <div>
                            <div class="course-title">{{ course.course_name }}</div>
                            <div class="meta-row">
                                <span class="pill">{{ courseCode(course) }}</span>
                                <span class="pill">{{ courseType(course).label }}</span>
                                <span class="pill">教学班 {{ openSections(course).length }}</span>
                                <span class="pill">{{ course.credits }} 学分</span>
                                <span class="pill">{{ course.hours_per_week }} 学时/周</span>
                                <span class="pill" :class="capacityClass(course)">{{ capacityLabel(course) }}</span>
                                <span class="pill" :class="courseEligibility(course).ok ? 'ok' : 'danger'">{{ courseEligibility(course).label }}</span>
                            </div>
                        </div>
                        <div>
                            <div class="section-head" style="margin-bottom: 6px;">
                                <span class="muted">容量使用</span>
                                <span class="muted">{{ course.active_request_count }}/{{ course.capacity }}，余量 {{ course.remaining_capacity }}</span>
                            </div>
                            <div class="progress"><span :class="capacityClass(course)" :style="{ width: capacityPercent(course) + '%' }"></span></div>
                        </div>
                        <div class="notice">
                            <div class="muted">教学班供给：{{ sectionSummary(course) }}</div>
                            <div class="muted">课程属性：{{ courseType(course).label }} · {{ courseType(course).rule }}</div>
                            <div class="muted">适用范围：{{ eligibilitySummary(course) }}</div>
                            <div class="muted">学分要求：{{ course.credits }} 学分，提交后计入本轮选课意向学分。</div>
                            <div class="muted">建议：{{ courseAdvice(course) }}</div>
                        </div>
                        <div class="field" v-if="!isRequiredCourse(course)">
                            <label>选择教学班</label>
                            <select v-model="sectionDrafts[course.course_id]" :disabled="isScheduled(course.course_id)">
                                <option value="">请选择教师/教学班</option>
                                <option v-for="section in openSections(course)" :key="section.section_id" :value="section.section_id">
                                    {{ section.section_name }} · 教师 {{ section.teacher_id || '待分配' }} · 余量 {{ section.remaining_capacity }}
                                </option>
                            </select>
                        </div>
                        <div class="notice" v-if="selectedSection(course.course_id)">
                            <div class="muted">已选教学班：{{ selectedSection(course.course_id).section_name }} · 教师 {{ selectedSection(course.course_id).teacher_id || '待分配' }} · 容量 {{ selectedSection(course.course_id).capacity }} · 偏好楼栋 {{ selectedSection(course.course_id).preferred_building || '未设置' }}</div>
                        </div>
                        <div class="field" v-if="!isRequiredCourse(course)">
                            <label>意向优先级</label>
                            <select v-model="preferenceDrafts[course.course_id]" :disabled="isScheduled(course.course_id)">
                                <option value="1">第一意向</option>
                                <option value="2">第二意向</option>
                                <option value="3">第三意向</option>
                            </select>
                        </div>
                        <div class="notice" v-else>
                            <div class="muted">必修课属于培养方案保障课程，不参与学生意向排序。</div>
                        </div>
                        <div class="actions">
                            <button class="btn success" :disabled="!isSelectionOpen || isScheduled(course.course_id) || isRequiredCourse(course) || !courseEligibility(course).ok" @click="submitRequest(course)">
                                {{ !isSelectionOpen ? '批次不可提交' : isRequiredCourse(course) ? '计划内保障' : !courseEligibility(course).ok ? courseEligibility(course).label : hasRequested(course.course_id) ? '更新意向' : '提交意向' }}
                            </button>
                            <span class="pill warn" v-if="hasRequested(course.course_id)">已申请</span>
                            <span class="pill ok" v-if="isScheduled(course.course_id)">已排课</span>
                        </div>
                    </article>
                </div>
                <div class="empty" v-else>没有符合条件的开放教学班。</div>
            </section>

            <section class="panel">
                <div class="section-head"><h2>我的有效选课意向</h2></div>
                <div class="actions" style="margin-bottom: 12px;" v-if="activeRequests.length">
                    <button class="btn secondary" @click="printSchedule">打印选课确认单</button>
                </div>
                <div class="table-wrap" v-if="activeRequests.length">
                    <table>
                        <thead><tr><th>课程</th><th>意向</th><th>状态</th><th>提交时间</th><th>操作</th></tr></thead>
                        <tbody>
                            <tr v-for="item in activeRequests" :key="item.id">
                                <td>{{ item.course_name }}<br><span class="muted">{{ item.section_name || courseCode(item) }} · 教师 {{ item.section_teacher_id || '待分配' }}</span></td>
                                <td>{{ item.preference_label }}</td>
                                <td><span class="pill" :class="statusClass(item.status)">{{ requestStatusText(item) }}</span></td>

                        <button class="btn secondary" @click="clearAuditLog">清空本地记录</button>

                    <div class="audit-item" v-for="item in auditLog" :key="item.id">

                        <div class="muted">{{ item.time }} · {{ item.detail }}</div>
                    </div>

                <div class="empty" v-else>暂无操作记录。本记录保存在当前浏览器本地，用于演示管理员操作追踪。</div>
